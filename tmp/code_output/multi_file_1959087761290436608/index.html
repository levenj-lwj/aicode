<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务记录网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>任务记录</h1>
        <p>轻松管理您的日常任务</p>
    </header>
    <main>
        <section class="task-form">
            <h2>添加新任务</h2>
            <form id="taskForm">
                <input type="text" id="taskInput" placeholder="输入任务描述" required>
                <button type="submit">添加任务</button>
            </form>
        </section>
        <section class="task-list">
            <h2>任务列表</h2>
            <ul id="taskList">
                <!-- 任务将动态添加到这里 -->
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 任务记录网站</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
