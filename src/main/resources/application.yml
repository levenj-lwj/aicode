spring:
    profiles:
        active: local
    application:
        name: aicodetest
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/ai_code
        username: root
        password: 12345
    data:
        redis:
            host: localhost
            port: 6379
            password: 123456
            ttl: 3600
            database: 0
    session:
        store-type: redis
        timeout: 2592000
server:
    port: 8123
    servlet:
        context-path: /api
        session:
            cookie:
                max-age: 2592000
# springdoc-openapi
springdoc:
    group-configs:
        - group: "default"
          packages-to-scan: org.levenj.aicodetest.controller
# knife4j
# http://localhost:8123/api/doc.html#/home
knife4j:
    enable: true
    setting:
        language: zh_cn